<!DOCTYPE html>
<html>
<head>
  <title>Aim Calibration Elite</title>
</head>

<body style="
margin:0;
overflow:hidden;
background:#0b0f14;
font-family:Arial;
color:white;
">

<div id="ui" style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:540px;
max-width:92%;
z-index:10;
background:rgba(12,16,22,0.94);
padding:32px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:
0 0 40px rgba(0,0,0,0.5),
0 0 80px rgba(76,175,239,0.08);
backdrop-filter:blur(12px);
text-align:center;
">

  <h1 style="
  margin:0;
  font-size:42px;
  font-weight:800;
  ">
    Aim Calibration Elite
  </h1>

  <div style="
  margin-top:14px;
  font-size:22px;
  line-height:1.4;
  font-weight:600;
  color:#4cafef;
  ">
    Your aim changes every day.<br>
    Your sensitivity should too.
  </div>

  <p style="
  margin-top:20px;
  color:#9fb0c3;
  font-size:15px;
  line-height:1.7;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
  ">
    Daily adaptive sensitivity calibration for competitive FPS players.
  </p>

  <select id="gameSelect" style="
  width:100%;
  padding:16px;
  margin-bottom:14px;
  border-radius:14px;
  border:none;
  background:#131b24;
  color:white;
  font-size:15px;
  ">
    <option value="cs2">Counter-Strike 2</option>
    <option value="valorant">Valorant</option>
    <option value="apex">Apex Legends</option>
    <option value="cod">Call of Duty</option>
    <option value="fortnite">Fortnite</option>
  </select>

  <input
    id="dpiInput"
    type="number"
    placeholder="Mouse DPI"
    value="800"
    style="
    width:100%;
    padding:16px;
    margin-bottom:14px;
    border-radius:14px;
    border:none;
    background:#131b24;
    color:white;
    font-size:15px;
    box-sizing:border-box;
    "
  >

  <input
    id="sensInput"
    type="number"
    step="0.01"
    placeholder="In-Game Sensitivity"
    value="1.5"
    style="
    width:100%;
    padding:16px;
    margin-bottom:22px;
    border-radius:14px;
    border:none;
    background:#131b24;
    color:white;
    font-size:15px;
    box-sizing:border-box;
    "
  >

  <button
    onclick="startCalibration()"
    style="
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#4cafef;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    "
  >
    Start Daily Calibration
  </button>

</div>

<div id="resultsScreen" style="
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:560px;
max-width:92%;
z-index:30;
background:rgba(12,16,22,0.96);
padding:40px;
border-radius:24px;
text-align:center;
box-shadow:
0 0 40px rgba(0,0,0,0.6),
0 0 80px rgba(76,175,239,0.08);
">

  <div style="
  color:#4cafef;
  font-size:14px;
  letter-spacing:2px;
  font-weight:bold;
  ">
    DAILY CALIBRATION COMPLETE
  </div>

  <h2 style="
  font-size:42px;
  margin-top:14px;
  margin-bottom:10px;
  ">
    Recommended Sensitivity
  </h2>

  <div id="recommendedSens" style="
  font-size:64px;
  font-weight:800;
  color:#4cafef;
  margin-top:10px;
  ">
  </div>

  <div id="sensChange" style="
  margin-top:12px;
  font-size:18px;
  color:#9fb0c3;
  ">
  </div>

  <div style="
  margin-top:34px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  ">

    <div style="
    background:#131b24;
    padding:20px;
    border-radius:18px;
    ">
      <div style="color:#4cafef;font-size:13px;">
        FLICK SCORE
      </div>

      <div id="flickScore" style="
      margin-top:10px;
      font-size:30px;
      font-weight:bold;
      ">
      </div>
    </div>

    <div style="
    background:#131b24;
    padding:20px;
    border-radius:18px;
    ">
      <div style="color:#4cafef;font-size:13px;">
        TRACKING SCORE
      </div>

      <div id="trackingScore" style="
      margin-top:10px;
      font-size:30px;
      font-weight:bold;
      ">
      </div>
    </div>

  </div>

  <div style="
  margin-top:18px;
  background:#131b24;
  padding:20px;
  border-radius:18px;
  ">

    <div style="color:#4cafef;font-size:13px;">
      MICRO ADJUSTMENT SCORE
    </div>

    <div id="microScore" style="
    margin-top:10px;
    font-size:30px;
    font-weight:bold;
    ">
    </div>

  </div>

  <button
    onclick="restartCalibration()"
    style="
    margin-top:30px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    background:#4cafef;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    "
  >
    Run Another Calibration
  </button>

</div>

<div id="phaseBriefing" style="
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:500px;
max-width:90%;
background:rgba(12,16,22,0.96);
padding:40px;
border-radius:20px;
text-align:center;
z-index:20;
">

<div id="briefingPhase"></div>
<h2 id="briefingTitle"></h2>
<p id="briefingDescription"></p>

<button onclick="beginPhase()" style="
margin-top:24px;
padding:16px 28px;
border:none;
border-radius:14px;
background:#4cafef;
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
">
Begin
</button>

</div>

<div id="hud" style="
display:none;
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:420px;
background:rgba(12,16,22,0.72);
padding:18px;
border-radius:18px;
z-index:15;
text-align:center;
backdrop-filter:blur(10px);
">

<div id="phaseText"></div>

<div id="countdownText" style="
font-size:42px;
margin-top:10px;
font-weight:800;
color:#4cafef;
"></div>

<div style="
width:100%;
height:8px;
background:#18222d;
margin-top:18px;
border-radius:999px;
overflow:hidden;
">

<div id="progressBar" style="
height:100%;
width:0%;
background:#4cafef;
transition:0.3s;
"></div>

</div>

<div id="liveStats" style="
margin-top:16px;
display:flex;
justify-content:space-between;
font-size:13px;
color:#9fb0c3;
gap:10px;
">

<div>
Accuracy:
<span id="accuracyStat">0%</span>
</div>

<div>
Hits:
<span id="hitsStat">0</span>
</div>

<div>
Avg Time:
<span id="reactionStat">0ms</span>
</div>

</div>

<button
onclick="restartCalibration()"
style="
margin-top:16px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#1d2733;
color:white;
cursor:pointer;
font-size:13px;
">
Restart Calibration
</button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const HUD_HEIGHT = 180;

let aim = {
  x: canvas.width / 2,
  y: canvas.height / 2 + HUD_HEIGHT / 2
};

let target = {x:0,y:0,vx:0,vy:0};

let config;
let stats;
let spawnTime;
let totalReactionTime = 0;

let phases = ["flick","tracking","micro"];
let currentPhaseIndex = 0;

let phaseScores = {
  flick:0,
  tracking:0,
  micro:0
};

let currentSens = 1.5;
let sensMultiplier = 1;

function startCalibration(){

  currentSens =
    parseFloat(
      document.getElementById("sensInput").value
    );

  document.getElementById("ui").style.display = "none";

  currentPhaseIndex = 0;

  showPhaseBriefing();
}

function showPhaseBriefing(){

  const phase = phases[currentPhaseIndex];

  document.getElementById("phaseBriefing").style.display = "block";

  document.getElementById("briefingPhase").innerText =
    "PHASE " + (currentPhaseIndex + 1);

  if(phase === "flick"){
    document.getElementById("briefingTitle").innerText =
      "Flick Precision";

    document.getElementById("briefingDescription").innerHTML =
      "Rapidly snap between static targets as quickly and accurately as possible.";
  }

  if(phase === "tracking"){
    document.getElementById("briefingTitle").innerText =
      "Tracking Control";

    document.getElementById("briefingDescription").innerHTML =
      "Track moving targets smoothly while maintaining precision.";
  }

  if(phase === "micro"){
    document.getElementById("briefingTitle").innerText =
      "Micro Adjustment";

    document.getElementById("briefingDescription").innerHTML =
      "Make small precise corrections on tiny targets.";
  }

}

function beginPhase(){

  document.getElementById("phaseBriefing").style.display = "none";
  document.getElementById("hud").style.display = "block";

  runPhase();
}

function runPhase(){

  let phase = phases[currentPhaseIndex];

  document.getElementById("phaseText").innerText =
    phase.toUpperCase();

  config = getConfig(phase);

  stats = {
    hits:0,
    misses:0
  };

  totalReactionTime = 0;

  spawn();

  canvas.requestPointerLock();

  setTimeout(endPhase,15000);
}

function getConfig(phase){

  if(phase==="flick"){
    return {speed:0,size:8,hitbox:10};
  }

  if(phase==="tracking"){
    return {speed:1.8,size:12,hitbox:14};
  }

  if(phase==="micro"){
    return {speed:0.7,size:5,hitbox:6};
  }

}

function spawn(){

  const topSafeZone = HUD_HEIGHT + 40;

  target.x =
    Math.random() * (canvas.width - 100) + 50;

  target.y =
    Math.random() * (canvas.height - topSafeZone - 100)
    + topSafeZone;

  target.vx = (Math.random()*2-1) * config.speed;
  target.vy = (Math.random()*2-1) * config.speed;

  spawnTime = performance.now();
}

function updateTarget(){

  target.x += target.vx;
  target.y += target.vy;

  if(target.x < 40 || target.x > canvas.width-40){
    target.vx *= -1;
  }

  if(target.y < HUD_HEIGHT + 40 || target.y > canvas.height-40){
    target.vy *= -1;
  }

}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  updateTarget();

  ctx.beginPath();
  ctx.arc(target.x,target.y,config ? config.size : 8,0,Math.PI*2);
  ctx.fillStyle = "red";
  ctx.fill();

  ctx.beginPath();

  ctx.moveTo(aim.x-10,aim.y);
  ctx.lineTo(aim.x+10,aim.y);

  ctx.moveTo(aim.x,aim.y-10);
  ctx.lineTo(aim.x,aim.y+10);

  ctx.strokeStyle = "white";
  ctx.stroke();

  requestAnimationFrame(draw);
}

document.addEventListener("mousemove", e=>{

  if(document.pointerLockElement === canvas){

    aim.x += e.movementX * sensMultiplier;
    aim.y += e.movementY * sensMultiplier;

    aim.x = Math.max(0,Math.min(canvas.width,aim.x));

    aim.y = Math.max(
      HUD_HEIGHT,
      Math.min(canvas.height, aim.y)
    );

  }

});

canvas.addEventListener("click", ()=>{

  if(!config) return;

  let dx = aim.x - target.x;
  let dy = aim.y - target.y;

  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < config.hitbox){

    stats.hits++;

    totalReactionTime +=
      performance.now() - spawnTime;

    spawn();

  } else {

    stats.misses++;

  }

  let totalShots =
    stats.hits + stats.misses;

  let accuracy =
    totalShots > 0
    ? ((stats.hits / totalShots) * 100).toFixed(0)
    : 0;

  let avgReaction =
    stats.hits > 0
    ? (totalReactionTime / stats.hits).toFixed(0)
    : 0;

  document.getElementById("accuracyStat").innerText =
    accuracy + "%";

  document.getElementById("hitsStat").innerText =
    stats.hits;

  document.getElementById("reactionStat").innerText =
    avgReaction + "ms";

});

function endPhase(){

  document.exitPointerLock();

  const phase = phases[currentPhaseIndex];

  let totalShots =
    stats.hits + stats.misses;

  let accuracy =
    totalShots > 0
    ? (stats.hits / totalShots)
    : 0;

  phaseScores[phase] =
    Math.round(accuracy * 100);

  currentPhaseIndex++;

  document.getElementById("progressBar").style.width =
    ((currentPhaseIndex / phases.length) * 100) + "%";

  if(currentPhaseIndex < phases.length){

    setTimeout(showPhaseBriefing,1000);

  } else {

    showResults();

  }

}

function showResults(){

  document.getElementById("hud").style.display = "none";

  let avgScore =
    (
      phaseScores.flick +
      phaseScores.tracking +
      phaseScores.micro
    ) / 3;

  let adjustment = 0;

  if(avgScore < 55){
    adjustment = 0.06;
  }
  else if(avgScore < 75){
    adjustment = 0.03;
  }
  else if(avgScore > 92){
    adjustment = -0.02;
  }

  let recommended =
    (currentSens * (1 + adjustment)).toFixed(2);

  document.getElementById("recommendedSens").innerText =
    recommended;

  let direction =
    adjustment > 0
    ? "Increase"
    : adjustment < 0
    ? "Decrease"
    : "Maintain";

  document.getElementById("sensChange").innerText =
    direction +
    " from " +
    currentSens.toFixed(2);

  document.getElementById("flickScore").innerText =
    phaseScores.flick + "%";

  document.getElementById("trackingScore").innerText =
    phaseScores.tracking + "%";

  document.getElementById("microScore").innerText =
    phaseScores.micro + "%";

  document.getElementById("resultsScreen").style.display =
    "block";

}

function restartCalibration(){

  document.exitPointerLock();

  location.reload();
}

draw();

</script>

</body>
</html>
